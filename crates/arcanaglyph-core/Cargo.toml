# crates/arcanaglyph-core/Cargo.toml

[package]
name = "arcanaglyph-core"
version = "0.1.0"
edition = "2024"

[dependencies]
cpal = "0.16.0"
vosk = "0.3.1"
serde = { version = "1.0", features = ["derive"] }
