# .arcanacodex-arch.toml
# Архитектурные границы ArcanaGlyph (исполняемый gate через `architecture_check`).
# Два крейта: core (библиотека STT) и app (Tauri-приложение).
# Правило: core НЕ зависит от app; app → core разрешено.

# --- Слои: ребро допустимо только "вниз" по layer_direction. ---
[[layers]]
name = "core"
# Библиотека STT: аудио, движки, dsp, конфиг, БД, ввод. Не знает о Tauri/UI.
paths = ["crates/arcanaglyph-core/src/"]

[[layers]]
name = "app"
# Tauri-приложение: команды (IPC), setup, tray, updater. Зависит от core.
paths = ["crates/arcanaglyph-app/src/"]

# app может зависеть от core, обратное — нарушение.
layer_direction = ["core", "app"]

# --- Изоляция STT-бэкендов: gigaam и qwen3asr — параллельные реализации
# Transcriber. Общий код идёт только через dsp/ + transcriber.rs, не напрямую
# один в другой (после выноса dsp это фиксируется как инвариант). ---
[[module_isolation]]
name = "gigaam-backend"
path = "crates/arcanaglyph-core/src/gigaam/"
forbidden = ["crates/arcanaglyph-core/src/qwen3asr/"]

[[module_isolation]]
name = "qwen3asr-backend"
path = "crates/arcanaglyph-core/src/qwen3asr/"
forbidden = ["crates/arcanaglyph-core/src/gigaam/"]
