name: Build & Upload Release Assets

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        # Frontend собирается через Vite (см. frontend/), Tauri дёргает
        # `npm run build` через `beforeBuildCommand` в tauri.conf.json.
        # Node 22 LTS — Node 20 deprecated на runner'ах GitHub Actions
        # (cutoff сентябрь 2026, заменяем заранее).
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        # `npm ci` строже `npm install` — fail при mismatch lockfile,
        # что важно для воспроизводимости релизов.
        run: npm --prefix frontend ci

      - name: Build frontend
        # Билдим frontend здесь явно, до tauri build. Нельзя полагаться
        # на Tauri's beforeBuildCommand с relative path — в GH Actions
        # repo лежит как /home/runner/work/<repo>/<repo>/, и Tauri
        # резолвит `../../frontend` от `<repo>/<repo>/` → промахивается
        # на один уровень. Строим явно — Tauri дальше просто читает
        # уже-готовый frontend/dist/ через frontendDist.
        run: npm --prefix frontend run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        # cmake — для whisper.cpp.
        # libfuse2 — для запуска appimagetool через extract-and-run fallback.
        # libglib2.0-bin — даёт glib-compile-schemas (GNOME-extension widget +
        #                  linuxdeploy-plugin-gtk).
        # linuxdeploy-plugin-gtk требует кучу .pc и утилит, на чистой Ubuntu
        # они не все стоят — добавляем явно, чтобы плагин не падал на pkg-config
        # запросах вроде `there is no 'libdir' variable for X`:
        #   librsvg2-dev          → librsvg-2.0.pc (+ librsvg2-common тянется по
        #                           Depends — runtime SVG loader для pixbuf).
        #   libpango1.0-dev       → pango.pc / pangocairo.pc / pangoft2.pc.
        #   libgdk-pixbuf-2.0-dev → gdk-pixbuf-2.0.pc.
        # И утилиты, которые плагин ищет через `search_tool`:
        #   libgtk-3-bin          → gtk-query-immodules-3.0.
        #   libgdk-pixbuf2.0-bin  → gdk-pixbuf-query-loaders (без него
        #                           loaders.cache не создаётся, sed -i по нему
        #                           может уронить плагин).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libxdo-dev libayatana-appindicator3-dev \
            libssl-dev patchelf \
            libfuse2 desktop-file-utils \
            libglib2.0-bin libgtk-3-bin libgdk-pixbuf2.0-bin \
            librsvg2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Install libvosk system-wide
        # linuxdeploy (внутри Tauri AppImage bundler) анализирует ELF-зависимости
        # бинаря и ищет libvosk.so в стандартных linker paths. Без этого шага он
        # падает с "Could not find dependency: libvosk.so". Мы кладём libvosk
        # внутрь .deb/.AppImage позже (post-process в build-deb.sh), но Tauri
        # AppImage build запускается ДО post-process и должен видеть либу
        # в системе. Локально у разработчика она в /usr/local/lib/ обычно лежит
        # руками; в CI её туда кладёт этот шаг через prepare-bundled-libs.sh.
        run: |
          bash scripts/prepare-bundled-libs.sh
          sudo cp assets/libs/libvosk.so /usr/local/lib/
          sudo ldconfig

      - name: Pre-extract AppImage tools (avoid FUSE in CI)
        # На GitHub Actions FUSE недоступен в transitive subprocess'ах:
        # APPIMAGE_EXTRACT_AND_RUN=1 помогает только корневому AppImage,
        # но linuxdeploy форкает plugin-appimage (тоже AppImage), и тот падает.
        # Скрипт распаковывает plugin-appimage в ~/.cache/tauri/ и подменяет
        # его на shell-shim — Tauri запустит как обычный exec без FUSE.
        run: bash scripts/ci-prepare-appimage-tools.sh

      - name: Build self-contained .deb + .AppImage
        # Используем тот же скрипт, что и локальная сборка (`make dist`):
        #   * собирает оба бинаря (avx + noavx) с разными whisper.cpp флагами;
        #   * упаковывает 3 нативные либы (libonnxruntime-{avx2,noavx}.so + libvosk.so)
        #     внутрь .deb и .AppImage;
        #   * в .AppImage кладёт AppRun-wrapper, который выставляет ORT_DYLIB_PATH /
        #     LD_LIBRARY_PATH перед exec'ом нужного бинаря.
        # APPIMAGE_EXTRACT_AND_RUN на уровне шага — наследуется в каждый
        # subprocess (cargo, tauri-cli, linuxdeploy, plugin'ы); inline-копия
        # внутри build-deb.sh остаётся как страховка.
        # BUILD_DEB_NO_FILTER=1 отключает фильтр шумных строк plugin-gtk, чтобы в CI
        # был полный лог linuxdeploy для диагностики падений. Без флага — те же
        # десятки тысяч `Copying file`/`Setting rpath` фильтруются (в CI это раздувает
        # log artifact, но не ломает сборку). `--verbose` сам по себе теперь всегда
        # включён в build-deb.sh — без него Tauri запускает linuxdeploy с
        # `--verbosity 3` и сборка падает (см. комментарий в Phase 3).
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          LIBRARY_PATH: ${{ github.workspace }}/assets/libs
          BUILD_DEB_NO_FILTER: "1"
        run: bash scripts/build-deb.sh

      - name: Generate SHA256 checksums
        run: |
          cd target/release/bundle
          sha256sum deb/*.deb appimage/*.AppImage > SHA256SUMS.txt
          echo "=== SHA256SUMS ===" && cat SHA256SUMS.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            target/release/bundle/deb/*.deb \
            target/release/bundle/appimage/*.AppImage \
            target/release/bundle/SHA256SUMS.txt \
            --clobber

  # Windows .exe (NSIS) — «витрина»: официальный релиз должен нести установщик
  # под Windows. Зеркалит проверенную логику GitLab-job `build-windows-test`
  # (см. .gitlab-ci.yml): тот же ORT 1.20.1 (api-20 в ort-крейте), та же связка
  # gigaam-system-ort (load-dynamic) + bundled onnxruntime.dll. Linux-сборка выше
  # (.deb/.AppImage) идёт параллельно отдельным job'ом — оба грузят в один релиз.
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        # Node 22 LTS (Node 20 deprecated на runner'ах GitHub Actions).
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build frontend
        # Явная сборка frontend до tauri build — Tauri дальше читает готовый
        # frontend/dist через frontendDist (как и в Linux-job выше).
        run: npm --prefix frontend run build

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Download onnxruntime.dll (win-x64)
        # Кладём DLL в resources рядом с tauri.windows.conf.json (resources=
        # libs/onnxruntime.dll). Версия = api-20 в ort-крейте (ORT 1.20.x).
        shell: pwsh
        env:
          ORT_VERSION: "1.20.1"
        run: |
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$($env:ORT_VERSION)/onnxruntime-win-x64-$($env:ORT_VERSION).zip" -OutFile ort.zip
          Expand-Archive -Path ort.zip -DestinationPath ort-extract -Force
          New-Item -ItemType Directory -Force -Path "crates\arcanaglyph-app\libs" | Out-Null
          Copy-Item "ort-extract\onnxruntime-win-x64-$($env:ORT_VERSION)\lib\onnxruntime.dll" "crates\arcanaglyph-app\libs\onnxruntime.dll" -Force

      - name: Build NSIS installer
        # shell: cmd — PowerShell съедает голый `--` перед cargo-аргументами;
        # в cmd `--` спецсмысла не имеет и доходит до cargo дословно (тот же
        # обход, что `cmd /c` в GitLab-job). --no-default-features отключает
        # дефолтный gigaam (download-binaries), gigaam-system-ort = load-dynamic
        # + наша bundled DLL.
        shell: cmd
        run: cargo tauri build --bundles nsis -- --no-default-features --features gigaam-system-ort

      - name: Generate SHA256 checksum
        # Отдельный файл (не общий SHA256SUMS.txt) — Linux-job грузит свой с
        # --clobber, иначе перетёрли бы друг друга на одном релизе.
        shell: pwsh
        run: |
          $exe = Get-ChildItem target\release\bundle\nsis\*-setup.exe | Select-Object -First 1
          "$((Get-FileHash $exe.FullName -Algorithm SHA256).Hash)  $($exe.Name)" | Out-File -Encoding ascii SHA256SUMS-windows.txt
          Get-Content SHA256SUMS-windows.txt

      - name: Upload Windows assets to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $exe = (Get-ChildItem target\release\bundle\nsis\*-setup.exe | Select-Object -First 1).FullName
          gh release upload "$tag" "$exe" SHA256SUMS-windows.txt --clobber
