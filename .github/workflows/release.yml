name: Build & Upload Release Assets

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        # cmake — для whisper.cpp, libglib2.0-bin — для glib-compile-schemas (GNOME-extension
        # widget). libfuse2 нужен для запуска appimagetool через extract-and-run fallback.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libxdo-dev libayatana-appindicator3-dev \
            libssl-dev patchelf \
            libfuse2 desktop-file-utils \
            libglib2.0-bin

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Pre-extract AppImage tools (avoid FUSE in CI)
        # На GitHub Actions FUSE недоступен в transitive subprocess'ах:
        # APPIMAGE_EXTRACT_AND_RUN=1 помогает только корневому AppImage,
        # но linuxdeploy форкает plugin-appimage (тоже AppImage), и тот падает.
        # Скрипт распаковывает plugin-appimage в ~/.cache/tauri/ и подменяет
        # его на shell-shim — Tauri запустит как обычный exec без FUSE.
        run: bash scripts/ci-prepare-appimage-tools.sh

      - name: Probe linuxdeploy can run (debug stderr)
        # Tauri AppImage bundler глотает stderr процесса linuxdeploy и печатает
        # только обобщённое "failed to run linuxdeploy". Прогоняем linuxdeploy
        # руками — увидим конкретную ошибку (FUSE, shared lib, что угодно).
        # `|| true` чтобы шаг не упал даже если linuxdeploy ругается; нам нужен
        # сам диагностический вывод.
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set +e
          echo "=== Files in ~/.cache/tauri/ ==="
          ls -la ~/.cache/tauri/
          echo
          echo "=== file ~/.cache/tauri/linuxdeploy-x86_64.AppImage ==="
          file ~/.cache/tauri/linuxdeploy-x86_64.AppImage
          echo
          echo "=== Run linuxdeploy --version ==="
          ~/.cache/tauri/linuxdeploy-x86_64.AppImage --version 2>&1
          echo "linuxdeploy exit: $?"
          echo
          echo "=== Run linuxdeploy --help (truncated) ==="
          ~/.cache/tauri/linuxdeploy-x86_64.AppImage --help 2>&1 | head -20
          echo "linuxdeploy --help exit: $?"

      - name: Build self-contained .deb + .AppImage
        # Используем тот же скрипт, что и локальная сборка (`make dist`):
        #   * собирает оба бинаря (avx + noavx) с разными whisper.cpp флагами;
        #   * упаковывает 3 нативные либы (libonnxruntime-{avx2,noavx}.so + libvosk.so)
        #     внутрь .deb и .AppImage;
        #   * в .AppImage кладёт AppRun-wrapper, который выставляет ORT_DYLIB_PATH /
        #     LD_LIBRARY_PATH перед exec'ом нужного бинаря.
        # APPIMAGE_EXTRACT_AND_RUN на уровне шага — наследуется в каждый
        # subprocess (cargo, tauri-cli, linuxdeploy, plugin'ы); inline-копия
        # внутри build-deb.sh остаётся как страховка.
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          LIBRARY_PATH: ${{ github.workspace }}/assets/libs
        run: bash scripts/build-deb.sh

      - name: Generate SHA256 checksums
        run: |
          cd target/release/bundle
          sha256sum deb/*.deb appimage/*.AppImage > SHA256SUMS.txt
          echo "=== SHA256SUMS ===" && cat SHA256SUMS.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            target/release/bundle/deb/*.deb \
            target/release/bundle/appimage/*.AppImage \
            target/release/bundle/SHA256SUMS.txt \
            --clobber
