stages:
  - tag
  - mirror
  - release
  - deb

# Автоматическое создание тега при merge в main, если версия изменилась
create-tag:
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  before_script:
    - git remote set-url origin "${CI_REPOSITORY_URL}"
    - git config user.email "ci@arcanaglyph.dev"
    - git config user.name "GitLab CI"
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - echo "Версия из tauri.conf.json — $VERSION"
    - |
      if git tag --list "v$VERSION" | grep -q "v$VERSION"; then
        echo "Тег v$VERSION уже существует — пропускаем"
      else
        echo "Создаю тег v$VERSION..."
        git tag -a "v$VERSION" -m "Release v$VERSION"
        git push origin "v$VERSION"
        echo "Тег v$VERSION создан"
      fi

# Зеркалирование в GitHub при merge в main
mirror-to-github:
  stage: mirror
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - eval $(ssh-agent -s)
    - echo "$GITHUB_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - |
      git remote add github git@github.com:py-art/arcanaglyph.git || true
      git config user.email "ci@arcanaglyph.dev"
      git config user.name "GitLab CI"
      cp README.public.md README.md
      sed -i '/^## \[Unreleased\]/d' CHANGELOG.md
      for f in CLAUDE.md README.public.md NOTE.md Roadmap.md .gitlab-ci.yml .markdownlint.yaml .taplo.toml rustfmt.toml Makefile; do
        [ -f "$f" ] && git rm -f "$f"
      done
      [ -d scripts ] && git rm -rf scripts/
      git add -A
      git status
      git commit -m "ci: prepare public release" --allow-empty
      git push github HEAD:refs/heads/main --force
      git push github --tags

# Создание релиза в GitLab (в том же pipeline, после создания тега)
create-gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - TAG="v$VERSION"
    - echo "Создаю GitLab Release $TAG"
    - awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > notes.md
    - echo "Release notes:" && cat notes.md
    - release-cli create --name "Release $TAG" --tag-name "$TAG" --description "$(cat notes.md)" || echo "Релиз $TAG уже существует — пропускаем"

# Создание релиза в GitHub (в том же pipeline, после зеркалирования)
create-github-release:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  before_script:
    - apk add --no-cache curl jq
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - TAG="v$VERSION"
    - echo "Создаю GitHub Release $TAG"
    - awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > notes.md
    - echo "Release notes:" && cat notes.md
    - |
      BODY=$(jq -Rs . < notes.md)
      HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/py-art/arcanaglyph/releases" \
        -d "{\"tag_name\": \"$TAG\", \"name\": \"Release $TAG\", \"body\": $BODY}")
      if [ "$HTTP_CODE" = "201" ]; then
        echo "GitHub Release $TAG создан"
      elif [ "$HTTP_CODE" = "422" ]; then
        echo "GitHub Release $TAG уже существует — пропускаем"
      else
        echo "Ошибка создания релиза: HTTP $HTTP_CODE"
        cat /tmp/response.json
        exit 1
      fi

# Сборка self-contained .deb пакета (двойной бинарь avx/noavx + bundled libs) и
# заливка как ассет к свежесозданному GitHub Release. Тяжёлый job (~30-50 мин),
# выделен в отдельную stage чтобы не блокировать создание релиза.
build-deb-and-upload:
  stage: deb
  # Минимальный rust 1.88 (whisper-rs-sys 0.15 требует), edition 2024 требует ≥1.85.
  # `rust:1` — последний stable в семействе 1.x, на момент написания 1.92+.
  image: rust:1
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  needs:
    - create-github-release
  timeout: 90m
  variables:
    # Кеш cargo-registry между прогонами — не качать deps каждый раз заново.
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo-cache"
  cache:
    key: cargo-registry-v1
    paths:
      - .cargo-cache/registry/cache
      - .cargo-cache/registry/index
      - .cargo-cache/git
      - .cargo-cache/bin
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential cmake pkg-config curl unzip dpkg-dev jq ca-certificates
        libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev
        libayatana-appindicator3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
    # tauri-cli кешируется через CARGO_HOME — после первого прогона будет в .cargo-cache/bin/
    - command -v cargo-tauri >/dev/null || cargo install tauri-cli --version "^2.0" --locked
    - export PATH="$CARGO_HOME/bin:$PATH"
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - TAG="v$VERSION"
    - echo "Сборка self-contained .deb для $TAG..."
    - bash scripts/build-deb.sh
    - DEB="target/release/bundle/deb/ArcanaGlyph_${VERSION}_amd64.deb"
    - ls -lh "$DEB"
    - echo "Заливка $DEB как ассет к релизу $TAG..."
    - |
      RELEASE_ID=$(curl -sS -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/py-art/arcanaglyph/releases/tags/$TAG" | jq -r .id)
      if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
        echo "Релиз $TAG не найден на GitHub — создавался ли create-github-release?"; exit 1
      fi
      ASSET_NAME="ArcanaGlyph_${VERSION}_amd64.deb"
      HTTP_CODE=$(curl -sS -o /tmp/upload.json -w "%{http_code}" -X POST \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: application/vnd.debian.binary-package" \
        --data-binary @"$DEB" \
        "https://uploads.github.com/repos/py-art/arcanaglyph/releases/$RELEASE_ID/assets?name=$ASSET_NAME")
      if [ "$HTTP_CODE" = "201" ]; then
        echo "Ассет $ASSET_NAME загружен"
      elif [ "$HTTP_CODE" = "422" ]; then
        echo "Ассет $ASSET_NAME уже существует у релиза $TAG — пропускаем"
      else
        echo "Ошибка загрузки ассета: HTTP $HTTP_CODE"
        cat /tmp/upload.json
        exit 1
      fi
  artifacts:
    paths:
      - target/release/bundle/deb/*.deb
    expire_in: 30 days
    when: on_success
