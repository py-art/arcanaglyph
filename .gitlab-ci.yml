stages:
  - build
  - tag
  - mirror
  - release

# ──────────────────────────────────────────────────────────────────────────
# ПОЛИГОН Windows-сборки (.exe). Запускается ВРУЧНУЮ на feature-ветке
# (не main), отдаёт NSIS-инсталлятор как artifact пайплайна — GitHub в это
# не вовлечён. Прод-доставка .exe (рядом с .deb) — отдельным GitHub Actions
# job'ом после стабилизации сборки. Раннер: gitlab.com SaaS Windows Beta
# (tag saas-windows-medium-amd64, 2 vCPU / 7.5 GB, ~5 мин на provision,
# 400 free-min/мес). Образ: VS Build Tools + Node + cmake/curl/zip есть,
# Rust ставим сами, NSIS Tauri-bundler качает сам.
build-windows-test:
  stage: build
  tags:
    - saas-windows-medium-amd64
  rules:
    # Только вручную и только на feature-ветках (main собирает GitHub Actions).
    - if: '$CI_COMMIT_BRANCH != "main"'
      when: manual
      allow_failure: true
  variables:
    # Версия Microsoft ONNX Runtime — должна совпадать с api-20 в ort-крейте
    # (ORT 1.20.x), как и для Linux-сборки. См. crates/arcanaglyph-core/Cargo.toml.
    ORT_VERSION: "1.20.1"
  cache:
    # Кэш cargo между прогонами — без него каждая сборка тянет и компилирует
    # весь dep-tree заново (на 2 vCPU это дорого по CI-минутам).
    # when: always — сохраняем кэш даже при провале job'а (иначе на итерациях,
    # пока сборка падает, кэш никогда не записывается и компиляция каждый раз с нуля).
    key: "windows-cargo"
    when: always
    paths:
      - .cargo-cache/
      - target/
  script:
    # PowerShell (дефолтный шелл Windows-раннера). $ErrorActionPreference=Stop —
    # чтобы любой сбой команды валил job, а не проглатывался.
    - $ErrorActionPreference = "Stop"
    - $env:CARGO_HOME = "$CI_PROJECT_DIR\.cargo-cache"
    # 1. Rust (MSVC host; на образе его нет).
    - Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile rustup-init.exe
    - .\rustup-init.exe -y --default-toolchain stable --profile minimal
    - $env:Path = "$env:CARGO_HOME\bin;$env:Path"
    - rustc --version; cargo --version
    # 2. Tauri CLI — ставим prebuilt через npm (Node предустановлен), а не
    #    `cargo install` (компиляция cli ~5-8 мин на 2 ядрах = лишние CI-минуты).
    - npm install -g "@tauri-apps/cli@^2"
    - $env:Path = "$env:APPDATA\npm;$env:Path"
    - tauri --version
    # 3. Frontend (Vite). Tauri дальше просто читает готовый frontend/dist.
    - npm --prefix frontend ci
    - npm --prefix frontend run build
    # 4. onnxruntime.dll (win-x64) → в resources рядом с tauri.windows.conf.json.
    - Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$($env:ORT_VERSION)/onnxruntime-win-x64-$($env:ORT_VERSION).zip" -OutFile ort.zip
    - Expand-Archive -Path ort.zip -DestinationPath ort-extract -Force
    - New-Item -ItemType Directory -Force -Path "crates\arcanaglyph-app\libs" | Out-Null
    - Copy-Item "ort-extract\onnxruntime-win-x64-$($env:ORT_VERSION)\lib\onnxruntime.dll" "crates\arcanaglyph-app\libs\onnxruntime.dll" -Force
    # 5. Сборка NSIS-инсталлятора. tauri.windows.conf.json мержится автоматически
    #    (targets=nsis, resources=libs/onnxruntime.dll). --no-default-features
    #    отключает дефолтный gigaam (download-binaries), gigaam-system-ort =
    #    load-dynamic + наша bundled DLL. Аргументы после `--` идут в cargo.
    #    Запуск через `cmd /c`: PowerShell мешает передаче `--` (съедает голый
    #    `--`, а `--%` в GitLab-скрипте улетает в tauri как литерал). В cmd `--`
    #    спецсмысла не имеет и доходит до tauri дословно. tauri/cargo берутся из
    #    PATH (унаследован дочерним cmd), CARGO_HOME выставлен выше.
    - cmd /c "tauri build --bundles nsis -- --no-default-features --features gigaam-system-ort"
  artifacts:
    name: "arcanaglyph-windows-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/release/bundle/nsis/*-setup.exe
    expire_in: 1 week

# Автоматическое создание тега при merge в main, если версия изменилась
create-tag:
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  before_script:
    - git remote set-url origin "${CI_REPOSITORY_URL}"
    - git config user.email "ci@arcanaglyph.dev"
    - git config user.name "GitLab CI"
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - echo "Версия из tauri.conf.json — $VERSION"
    - |
      if git tag --list "v$VERSION" | grep -q "v$VERSION"; then
        echo "Тег v$VERSION уже существует — пропускаем"
      else
        echo "Создаю тег v$VERSION..."
        git tag -a "v$VERSION" -m "Release v$VERSION"
        git push origin "v$VERSION"
        echo "Тег v$VERSION создан"
      fi

# Зеркалирование в GitHub при merge в main
mirror-to-github:
  stage: mirror
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - eval $(ssh-agent -s)
    - echo "$GITHUB_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - |
      git remote add github git@github.com:py-art/arcanaglyph.git || true
      git config user.email "ci@arcanaglyph.dev"
      git config user.name "GitLab CI"
      cp README.public.md README.md
      sed -i '/^## \[Unreleased\]/d' CHANGELOG.md
      for f in CLAUDE.md README.public.md NOTE.md Roadmap.md .gitlab-ci.yml .markdownlint.yaml .taplo.toml rustfmt.toml Makefile .env.example; do
        [ -f "$f" ] && git rm -f "$f"
      done
      [ -d scripts ] && git rm -rf scripts/
      [ -d dev-notes ] && git rm -rf dev-notes/
      git add -A
      git status
      git commit -m "ci: prepare public release" --allow-empty
      git push github HEAD:refs/heads/main --force
      git push github --tags

# Создание релиза в GitLab (в том же pipeline, после создания тега)
create-gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - TAG="v$VERSION"
    - echo "Создаю GitLab Release $TAG"
    - awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > notes.md
    - echo "Release notes:" && cat notes.md
    - release-cli create --name "Release $TAG" --tag-name "$TAG" --description "$(cat notes.md)" || echo "Релиз $TAG уже существует — пропускаем"

# Создание релиза в GitHub (в том же pipeline, после зеркалирования)
create-github-release:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  before_script:
    - apk add --no-cache curl jq
  script:
    - VERSION=$(grep -m1 '"version"' crates/arcanaglyph-app/tauri.conf.json | sed 's/.*"version".*"\(.*\)".*/\1/')
    - TAG="v$VERSION"
    - echo "Создаю GitHub Release $TAG"
    - awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > notes.md
    - echo "Release notes:" && cat notes.md
    - |
      BODY=$(jq -Rs . < notes.md)
      HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/py-art/arcanaglyph/releases" \
        -d "{\"tag_name\": \"$TAG\", \"name\": \"Release $TAG\", \"body\": $BODY}")
      if [ "$HTTP_CODE" = "201" ]; then
        echo "GitHub Release $TAG создан"
      elif [ "$HTTP_CODE" = "422" ]; then
        echo "GitHub Release $TAG уже существует — пропускаем"
      else
        echo "Ошибка создания релиза: HTTP $HTTP_CODE"
        cat /tmp/response.json
        exit 1
      fi

