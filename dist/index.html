<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcanaGlyph</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { overflow: hidden; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1b26;
        color: #c0caf5;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 0;
        user-select: none;
      }

      /* === Кастомный titlebar === */
      .titlebar {
        width: 100%;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        -webkit-app-region: drag;
        flex-shrink: 0;
        background: #16161e;
      }
      .titlebar-icon {
        width: 18px;
        height: 18px;
        margin-left: 10px;
        -webkit-app-region: no-drag;
        pointer-events: none;
      }
      .titlebar-btns {
        display: flex;
        -webkit-app-region: no-drag;
        height: 100%;
      }
      .titlebar-btn {
        width: 40px;
        height: 100%;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .titlebar-btn svg {
        width: 12px;
        height: 12px;
        stroke: #565f89;
        stroke-width: 1.5;
        fill: none;
      }
      .titlebar-btn:hover svg { stroke: #c0caf5; }
      .titlebar-btn:hover { background: rgba(255,255,255,0.06); }
      .btn-close:hover { background: #f7768e; }
      .btn-close:hover svg { stroke: #fff; }

      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        width: 100%;
        padding: 1rem 1rem 1rem;
      }

      h1 {
        font-size: 1.3rem;
        color: #bb9af7;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      /* === Микрофон === */
      .mic-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 0.8rem;
      }
      .mic-glow {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: rgba(122, 162, 247, 0.1);
        transition: background 0.3s;
      }
      .mic-glow.recording {
        background: rgba(247, 118, 142, 0.18);
        animation: glow-pulse 1.5s ease-in-out infinite;
      }
      @keyframes glow-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.5; }
      }
      .mic-btn {
        position: absolute;
        inset: 15px;
        border-radius: 50%;
        background: #1f2335;
        border: 3px solid #7aa2f7;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.3s, background 0.3s;
      }
      .mic-btn:hover { border-color: #89b4fa; }
      .mic-btn.recording {
        border-color: #f7768e;
        background: rgba(247, 118, 142, 0.1);
      }
      .mic-btn svg {
        width: 36px;
        height: 36px;
        fill: #7aa2f7;
        transition: fill 0.3s;
      }
      .mic-btn.recording svg { fill: #f7768e; }

      /* === Статус === */
      #status {
        font-size: 0.95rem;
        color: #7aa2f7;
        font-weight: 500;
        margin-bottom: 1.2rem;
      }
      #status.recording { color: #f7768e; }

      /* === Уровень === */
      .level-bar {
        width: 85%;
        max-width: 320px;
        height: 6px;
        background: #1f2335;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 1rem;
        visibility: hidden;
      }
      .level-bar.active { visibility: visible; }
      .level-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #9ece6a 0%, #7aa2f7 50%, #f7768e 100%);
        border-radius: 3px;
        transition: width 0.12s;
      }

      /* === Таймер === */
      #timer {
        font-size: 2.2rem;
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        letter-spacing: 3px;
        color: #c0caf5;
        margin-bottom: 1.5rem;
        visibility: hidden;
      }
      #timer.active { visibility: visible; }

      /* === Кнопки паузы/стоп === */
      .controls {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        margin-bottom: 1.5rem;
        visibility: hidden;
      }
      .controls.active { visibility: visible; }

      .ctrl-btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s;
      }
      .ctrl-btn:hover { opacity: 0.85; }

      .pause-btn { background: #ff9e64; }
      .pause-btn.resume { background: #9ece6a; }
      .pause-btn svg { width: 20px; height: 20px; fill: #1a1b26; }

      .stop-btn { background: #f7768e; }
      .stop-icon {
        width: 18px;
        height: 18px;
        background: #1a1b26;
        border-radius: 3px;
      }

      /* === Результат === */
      .result-wrap {
        position: relative;
        width: 90%;
        max-width: 360px;
        display: none;
        margin-top: 0.8rem;
      }
      .result-wrap.visible { display: block; }
      #result {
        font-size: 0.9rem;
        background: #1f2335;
        border: 1px solid #292e42;
        border-radius: 10px;
        padding: 0.8rem 1rem;
        word-wrap: break-word;
        white-space: pre-wrap;
        color: #a9b1d6;
        line-height: 1.5;
        text-align: justify;
        user-select: text;
        max-height: 200px;
        overflow: hidden;
      }
      #result.scrollable { overflow-y: auto; }
      .copy-btn {
        position: absolute;
        top: -12px;
        right: -12px;
        width: 28px;
        height: 28px;
        background: #1f2335;
        border: 1px solid #292e42;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, border-color 0.2s;
      }
      .copy-btn:hover { background: #292e42; border-color: #7aa2f7; }
      .copy-btn svg { width: 13px; height: 13px; fill: #565f89; }
      .copy-btn.copied svg { fill: #9ece6a; }

      /* === Ошибка === */
      #result.error {
        border-color: #f7768e;
        color: #f7768e;
      }
    </style>
  </head>
  <body>

    <!-- Кастомный titlebar -->
    <div class="titlebar">
      <img class="titlebar-icon" src="icon.png" alt="" />
      <div class="titlebar-btns">
        <button class="titlebar-btn btn-minimize" id="tb-min" title="Свернуть">
          <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6"/></svg>
        </button>
        <button class="titlebar-btn btn-maximize" id="tb-max" title="Развернуть">
          <svg viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1"/></svg>
        </button>
        <button class="titlebar-btn btn-close" id="tb-close" title="Закрыть">
          <svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
        </button>
      </div>
    </div>

    <div class="content">
    <h1>ArcanaGlyph</h1>

    <!-- Микрофон -->
    <div class="mic-wrap">
      <div class="mic-glow" id="mic-glow"></div>
      <div class="mic-btn" id="mic-btn">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </div>
    </div>

    <p id="status">Готов к записи</p>

    <!-- Результат (сразу под статусом) -->
    <div class="result-wrap" id="result-wrap">
      <div id="result"></div>
      <button class="copy-btn" id="copy-btn" title="Копировать">
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      </button>
    </div>

    <!-- Уровень звука -->
    <div class="level-bar" id="level-bar">
      <div class="level-fill" id="level-fill"></div>
    </div>

    <!-- Таймер -->
    <div id="timer">00:00</div>

    <!-- Кнопки паузы / стоп -->
    <div class="controls" id="controls">
      <button class="ctrl-btn pause-btn" id="pause-btn" title="Пауза">
        <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn stop-btn" id="stop-btn" title="Остановить">
        <div class="stop-icon"></div>
      </button>
    </div>

    </div><!-- .content -->
    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const { getCurrentWindow } = window.__TAURI__.window;
      const appWindow = getCurrentWindow();

      /* --- Кнопки titlebar --- */
      document.getElementById('tb-min').addEventListener('click', () => invoke('hide_window'));
      document.getElementById('tb-max').addEventListener('click', async () => {
        (await appWindow.isMaximized()) ? appWindow.unmaximize() : appWindow.maximize();
      });
      document.getElementById('tb-close').addEventListener('click', () => invoke('hide_window'));

      const statusEl  = document.getElementById('status');
      const resultWrap = document.getElementById('result-wrap');
      const resultEl  = document.getElementById('result');
      const copyBtn   = document.getElementById('copy-btn');
      const micBtn    = document.getElementById('mic-btn');
      const micGlow   = document.getElementById('mic-glow');
      const timerEl   = document.getElementById('timer');
      const levelBar  = document.getElementById('level-bar');
      const levelFill = document.getElementById('level-fill');
      const controlsEl = document.getElementById('controls');
      const stopBtn   = document.getElementById('stop-btn');
      const pauseBtn  = document.getElementById('pause-btn');

      let recording = false;
      let timerSec = 0;
      let timerId = null;
      let levelId = null;

      function fmt(s) {
        return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
      }

      /* --- Клик по микрофону = начать запись --- */
      micBtn.addEventListener('click', () => {
        if (!recording) invoke('trigger');
      });

      /* --- Клик по стопу = остановить --- */
      stopBtn.addEventListener('click', () => {
        if (recording) invoke('trigger');
      });

      /* --- Клик по паузе = приостановить/возобновить --- */
      pauseBtn.addEventListener('click', () => {
        if (recording) invoke('pause');
      });

      /* --- Копирование результата --- */
      copyBtn.addEventListener('click', async () => {
        await navigator.clipboard.writeText(resultEl.textContent);
        copyBtn.classList.add('copied');
        setTimeout(() => copyBtn.classList.remove('copied'), 1500);
      });

      /* --- События engine --- */
      listen('engine://recording-started', () => {
        recording = true;
        resultWrap.classList.remove('visible');
        resultEl.textContent = '';
        resultEl.classList.remove('error');

        micBtn.classList.add('recording');
        micGlow.classList.add('recording');
        statusEl.textContent = 'Запись...';
        statusEl.className = 'recording';

        controlsEl.classList.add('active');
        levelBar.classList.add('active');
        timerEl.classList.add('active');

        timerSec = 0;
        timerEl.textContent = '00:00';
        timerId = setInterval(() => { timerSec++; timerEl.textContent = fmt(timerSec); }, 1000);
        levelId = setInterval(async () => {
          const level = await invoke('get_audio_level');
          levelFill.style.width = level + '%';
        }, 100);
      });

      listen('engine://recording-paused', () => {
        statusEl.textContent = 'Пауза';
        statusEl.className = 'recording';
        clearInterval(timerId);
        clearInterval(levelId);
        levelFill.style.width = '0%';
        pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
        pauseBtn.classList.add('resume');
        pauseBtn.title = 'Продолжить';
      });

      listen('engine://recording-resumed', () => {
        statusEl.textContent = 'Запись...';
        statusEl.className = 'recording';
        timerId = setInterval(() => { timerSec++; timerEl.textContent = fmt(timerSec); }, 1000);
        levelId = setInterval(async () => {
          const level = await invoke('get_audio_level');
          levelFill.style.width = level + '%';
        }, 100);
        levelBar.classList.add('active');
        pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
        pauseBtn.classList.remove('resume');
        pauseBtn.title = 'Пауза';
      });

      listen('engine://transcribing', () => {
        // Запись окончена, идёт распознавание — обновляем UI
        statusEl.textContent = 'Транскрибация...';
        statusEl.className = 'recording';
        clearInterval(timerId);
        clearInterval(levelId);
        levelFill.style.width = '0%';
        levelBar.classList.remove('active');
        controlsEl.classList.remove('active');
      });

      listen('engine://transcription-result', (ev) => {
        resultEl.textContent = ev.payload.text || '(пустой результат)';
        resultWrap.classList.add('visible');
        requestAnimationFrame(() => {
          resultEl.classList.toggle('scrollable', resultEl.scrollHeight > resultEl.clientHeight);
        });
      });

      listen('engine://error', (ev) => {
        resultEl.textContent = ev.payload.message || 'Неизвестная ошибка';
        resultEl.classList.add('error');
        resultWrap.classList.add('visible');
      });

      listen('engine://finished-processing', () => {
        recording = false;

        micBtn.classList.remove('recording');
        micGlow.classList.remove('recording');
        statusEl.textContent = 'Готов к записи';
        statusEl.className = '';

        controlsEl.classList.remove('active');
        levelBar.classList.remove('active');
        timerEl.classList.remove('active');

        clearInterval(timerId);
        clearInterval(levelId);
        levelFill.style.width = '0%';
      });
    </script>
  </body>
</html>
